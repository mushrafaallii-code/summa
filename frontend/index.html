<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff7eb3, #65d6ce);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 8px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>
  <input id="u" placeholder="Username"><br>
  <input id="p" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  console.log("Button Clicked");

  const username = document.getElementById("u").value;
  const password = document.getElementById("p").value;

  // 🔹 Step 1: Basic validation
  if (!username || !password) {
    alert("Please enter username & password");
    return;
  }

  // 🔹 Step 2: Call backend API
  fetch('http://localhost:7000/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      username: username,
      password: password
    })
  })
  .then(response => {
    if (!response.ok) {
      throw new Error("Server not responding");
    }
    return response.json();
  })
  .then(data => {
    console.log("Response:", data);
    alert(data.message || "Login Success");
  })
  .catch(error => {
    console.error("Error:", error);
    alert("Cannot connect to backend (Check server)");
  });
}
</script>

</body>
</html>
